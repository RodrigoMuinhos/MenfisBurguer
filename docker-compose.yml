services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: menfis-backend
    env_file:
      - ./.env.local
    environment:
      MENFIS_ENVIRONMENT: local
      PORT: 8080
      FRONTEND_URL: http://192.168.40.193:3000
      BACKEND_URL: http://192.168.40.193:8083
      JAVA_OPTS: -Djava.net.preferIPv4Stack=true -Dnetworkaddress.cache.ttl=0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8083:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.40.193:8083
        NEXT_PUBLIC_MP_PUBLIC_KEY: ${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
    container_name: menfis-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://192.168.40.193:8083
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
