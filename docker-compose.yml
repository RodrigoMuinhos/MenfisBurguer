services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: menfis-backend
    env_file:
      - ./.env.local
    environment:
      MENFIS_ENVIRONMENT: local
      PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:?configure FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL:?configure BACKEND_URL}
      JAVA_OPTS: -Djava.net.preferIPv4Stack=true -Dnetworkaddress.cache.ttl=0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?configure NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MP_PUBLIC_KEY: ${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
        NEXT_PUBLIC_ORDER_RUNTIME_MODE: ${NEXT_PUBLIC_ORDER_RUNTIME_MODE:-delivery}
    container_name: menfis-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?configure NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_ORDER_RUNTIME_MODE: ${NEXT_PUBLIC_ORDER_RUNTIME_MODE:-delivery}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
