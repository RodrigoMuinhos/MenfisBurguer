server:
  port: ${PORT:8080}

spring:
  application:
    name: menfis-delivery-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:menfis}
    password: ${RABBITMQ_PASSWORD:menfis}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

menfis:
  environment: ${MENFIS_ENVIRONMENT:${RAILWAY_ENVIRONMENT_NAME:local}}
  backend-url: ${BACKEND_URL:}
  frontend-url: ${FRONTEND_URL:}
  jwt-secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
  mercado-pago-access-token: ${MERCADO_PAGO_ACCESS_TOKEN:${MP_ACCESS_TOKEN:}}
  mercado-pago-webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
  default-payer-email: ${MERCADO_PAGO_PAYER_EMAIL:}
  default-card-payer-email: ${MERCADO_PAGO_CARD_PAYER_EMAIL:}
  cloudinary-url: ${CLOUDINARY_URL:}
  whatsapp-verify-token: ${WHATSAPP_VERIFY_TOKEN:menfis-whatsapp-token}
  whatsapp-access-token: ${WHATSAPP_ACCESS_TOKEN:}
  whatsapp-phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:1217044968149576}
  whatsapp-business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID:864066526222050}
  whatsapp-graph-api-version: ${WHATSAPP_GRAPH_API_VERSION:v20.0}
  rabbitmq:
    orders-exchange: ${MENFIS_ORDERS_EXCHANGE:menfis.orders.exchange}
    kitchen-queue: ${MENFIS_KITCHEN_QUEUE:menfis.kitchen.queue}
    kitchen-dlq: ${MENFIS_KITCHEN_DLQ:menfis.kitchen.dlq}
    kitchen-dlx: ${MENFIS_KITCHEN_DLX:menfis.kitchen.dlx}
    order-paid-routing-key: ${MENFIS_ORDER_PAID_ROUTING_KEY:order.paid}

whatsapp:
  verify-token: ${WHATSAPP_VERIFY_TOKEN:menfis-whatsapp-token}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:1217044968149576}
  business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID:864066526222050}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
