server:
  port: ${PORT:8080}

spring:
  application:
    name: menfis-delivery-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

menfis:
  environment: ${MENFIS_ENVIRONMENT:${RAILWAY_ENVIRONMENT_NAME:local}}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt-secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
  mercado-pago-access-token: ${MERCADO_PAGO_ACCESS_TOKEN:${MP_ACCESS_TOKEN:}}
  mercado-pago-webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
  default-payer-email: ${MERCADO_PAGO_PAYER_EMAIL:}
  default-card-payer-email: ${MERCADO_PAGO_CARD_PAYER_EMAIL:}
  cloudinary-url: ${CLOUDINARY_URL:}
  whatsapp-verify-token: ${WHATSAPP_VERIFY_TOKEN:menfis-whatsapp-webhook}
  whatsapp-access-token: ${WHATSAPP_ACCESS_TOKEN:}
  whatsapp-phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  whatsapp-graph-api-version: ${WHATSAPP_GRAPH_API_VERSION:v20.0}
